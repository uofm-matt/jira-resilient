name: publish

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    # Configure PyPI trusted publishing for this project, environment "pypi":
    # https://docs.pypi.org/trusted-publishers/
    environment: pypi
    permissions:
      id-token: write    # required for trusted publishing
      contents: write    # required for `gh release create`
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Gate the release: tests + lint must pass and the tag must match the package version,
      # so a broken or mis-tagged build can never reach PyPI.
      - run: pip install -e ".[dev]"
      - run: pytest -q
      - run: ruff check src tests
      - name: Tag matches package version
        run: |
          PKG_VERSION="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::pyproject version $PKG_VERSION != tag $TAG_VERSION"; exit 1
          fi
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1

      # Extract the changelog entry for this tag and create a GitHub Release.
      # Print lines between the `## [X.Y.Z]` header and the next `## [` header
      # (exclusive). The header is matched as a LITERAL prefix via index(), not a
      # regex — `## [X.Y.Z]` as a regex treats `[`/`]`/`.` as metacharacters and
      # never matches, which silently stubbed every release's notes. Falls back to
      # a pointer if the section isn't found.
      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="## [$VERSION]" '
            index($0, ver) == 1 {flag=1; next}
            /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md > /tmp/release_notes.md
          # If CHANGELOG didn't yield anything, fall back to a stub.
          if [ ! -s /tmp/release_notes.md ]; then
            echo "Release $GITHUB_REF_NAME — see CHANGELOG.md for details." > /tmp/release_notes.md
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release_notes.md \
            --latest
